<table class="table">
  <thead>
    <tr>
      <th scope="col">id</th>
      <th scope="col">Name of Chef</th>
      <th scope="col">Experience</th>
      <th scope="col">Specialty</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor=" let chef of ChefsTable">
      <th scope="row">{{ chef.id }}</th>
      <td>{{ chef.name }}</td>
      <td>{{ chef.experience }}</td>
      <td>{{ chef.specialty }}</td>
    </tr>

  </tbody>
</table>
